<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everest Portfolio Gallery</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        /* Caption */
        .gallery-item {
            text-align: center;
        }

        .gallery-item p {
            margin-top: 10px;
            font-size: 1rem;
            color: #555;
        }
    </style>
</head>

<body>

    <h1>My Portfolio Gallery</h1>

    <div class="gallery">
        <div class="gallery-item">
            <img src="myweb.png" alt="landingpage">
            <p>Project 1: Landing Page</p>
        </div>

        <div class="gallery-item">
            <img src="signup.png" alt="Project 2">
            <p>Project 2: Blog Layout</p>
        </div>

        <div class="gallery-item">
            <img src="pricingtable.png" alt="Project 3">
            <p>Project 3: Pricing Table</p>
        </div>

        <div class="gallery-item">
            <img src="landingpage.png" alt="Project 4">
            <p>Project 4: Coffee Landing</p>
        </div>

        <div class="gallery-item">
            <img src="rresume3.png" alt="Project 5">
            <p>Project 5: Resume</p>
        </div>
    </div>

</body>

</html>
